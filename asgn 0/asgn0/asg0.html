<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>CSE 160 Assignment 0</title>
</head>
<body onload="main()">

  <canvas id="example" width="400" height="400">
    Please use a browser that supports "canvas"
  </canvas>
  <br><br>

  <!-- V1 inputs -->
  <label>V1 x: <input type="number" id="v1x" value="2.25"></label>
  <label>V1 y: <input type="number" id="v1y" value="2.25"></label>
  <br><br>

  <!-- V2 inputs -->
  <label>V2 x: <input type="number" id="v2x" value="-1.5"></label>
  <label>V2 y: <input type="number" id="v2y" value="1.0"></label>
  <br><br>

  <!-- Draw button for v1 and v2 -->
  <button onclick="handleDrawEvent()">Draw</button>
  <br><br>

  <!-- Operation selector, scalar input, and Draw Operation button -->
  <label>Operation:
    <select id="operation">
      <option value="add">Add</option>
      <option value="sub">Subtract</option>
      <option value="mul">Multiply</option>
      <option value="div">Divide</option>
      <option value="magnitude">Magnitude</option>
      <option value="normalize">Normalize</option>
      <option value="angle">Angle Between</option>
      <option value="area">Area</option>
    </select>
  </label>
  <label>Scalar: <input type="number" id="scalar" value="2"></label>
  <button onclick="handleDrawOperationEvent()">Draw Operation</button>

  <!-- Load the matrix library from lib/, then our app code -->
  <script src="lib/cuon-matrix-cse160.js"></script>
  <script src="asg0.js"></script>
</body>
</html>

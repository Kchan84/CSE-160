<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>CSE 160 | Assignment 0 — Vector Visualizer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px;
      gap: 20px;
    }

    h1 {
      font-size: 1.1rem;
      letter-spacing: 0.15em;
      color: #a0c4ff;
      text-transform: uppercase;
    }

    #canvas-container {
      border: 2px solid #334;
      border-radius: 4px;
      overflow: hidden;
    }

    canvas { display: block; }

    .controls {
      background: #16213e;
      border: 1px solid #334;
      border-radius: 6px;
      padding: 16px 20px;
      width: 460px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .row label {
      font-size: 0.8rem;
      color: #a0c4ff;
      min-width: 40px;
    }

    .row input[type="number"] {
      width: 80px;
      background: #0f3460;
      border: 1px solid #334;
      border-radius: 3px;
      color: #e0e0e0;
      padding: 4px 8px;
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
    }

    .row input[type="number"]:focus {
      outline: none;
      border-color: #a0c4ff;
    }

    select {
      background: #0f3460;
      border: 1px solid #334;
      border-radius: 3px;
      color: #e0e0e0;
      padding: 4px 8px;
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      cursor: pointer;
    }

    select:focus { outline: none; border-color: #a0c4ff; }

    button {
      background: #0f3460;
      border: 1px solid #a0c4ff;
      border-radius: 3px;
      color: #a0c4ff;
      padding: 6px 16px;
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: background 0.15s, color 0.15s;
    }

    button:hover {
      background: #a0c4ff;
      color: #1a1a2e;
    }

    .divider {
      border: none;
      border-top: 1px solid #334;
    }

    .section-label {
      font-size: 0.7rem;
      color: #556;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body onload="main()">

  <h1>Vector Visualizer — ASG 0</h1>

  <div id="canvas-container">
    <canvas id="vectorCanvas" width="400" height="400">
      Please use a browser that supports &lt;canvas&gt;
    </canvas>
  </div>

  <div class="controls">

    <span class="section-label">Vectors</span>

    <div class="row">
      <label>V1 x:</label>
      <input type="number" id="xOne" value="2.25" step="0.1">
      <label>V1 y:</label>
      <input type="number" id="yOne" value="2.25" step="0.1">
    </div>

    <div class="row">
      <label>V2 x:</label>
      <input type="number" id="xTwo" value="-1.5" step="0.1">
      <label>V2 y:</label>
      <input type="number" id="yTwo" value="1.0" step="0.1">
    </div>

    <div class="row">
      <button onclick="handleDrawEvent()">Draw Vectors</button>
    </div>

    <hr class="divider">

    <span class="section-label">Operations</span>

    <div class="row">
      <label style="min-width:60px">Op:</label>
      <select id="selectedOp">
        <option value="add">Add</option>
        <option value="sub">Subtract</option>
        <option value="mul">Multiply</option>
        <option value="div">Divide</option>
        <option value="magnitude">Magnitude</option>
        <option value="normalize">Normalize</option>
        <option value="angle">Angle Between</option>
        <option value="area">Area</option>
      </select>
      <label style="min-width:50px">Scalar:</label>
      <input type="number" id="scalarVal" value="2" step="0.1">
    </div>

    <div class="row">
      <button onclick="handleDrawOperationEvent()">Draw Operation</button>
    </div>

  </div>

  <script src="lib/cuon-matrix-cse160.js"></script>
  <script src="asg0.js"></script>
</body>
</html>
